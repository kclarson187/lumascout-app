<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LumaScout — Photo Spot</title>
<meta name="description" content="View this photo location on LumaScout — find amazing photo spots and connect with photographers." />
<meta property="og:title" content="Photo Spot on LumaScout" />
<meta property="og:description" content="View this photo location, scroll through images, and open directions." />
<meta property="og:image" content="" id="og-image" />
<meta property="og:type" content="website" />
<style>
  :root { --bg:#0A0A0A; --surface:#141416; --border:#2A2A2E; --gold:#F5A623; --text:#fff; --text2:#A1A1AA; --text3:#71717A; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding: 8px 0 16px; }
  .brand { font-family: Georgia, 'Playfair Display', serif; font-size: 22px; letter-spacing: -0.3px; }
  .brand b { color: var(--gold); }
  .open-btn { background: var(--gold); color: #1a1300; padding: 10px 16px; border-radius: 22px; font-weight: 700; text-decoration: none; font-size: 14px; }
  .hero { width: 100%; aspect-ratio: 4/3; border-radius: 22px; background: var(--surface); overflow: hidden; position: relative; border: 1px solid var(--border); }
  .hero img { width:100%; height:100%; object-fit: cover; display:block; }
  .gallery { display:flex; gap: 8px; overflow-x: auto; margin-top: 10px; padding-bottom: 4px; }
  .gallery img { width: 120px; height: 90px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); flex-shrink:0; cursor: pointer; }
  .gallery img.active { border-color: var(--gold); }
  .meta { margin-top: 18px; }
  .title { font-family: Georgia, 'Playfair Display', serif; font-size: 28px; line-height:1.2; letter-spacing: -0.5px; margin: 0; }
  .city { color: var(--text2); margin: 4px 0 12px; font-size: 14px; }
  .chips { display:flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .chip { background: rgba(245,166,35,0.10); color: var(--gold); border: 1px solid rgba(245,166,35,0.4); padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .desc { color: var(--text2); line-height: 1.55; font-size: 15px; margin-bottom: 24px; }
  .actions { display:flex; gap: 10px; flex-wrap: wrap; }
  .btn { display:inline-flex; align-items:center; gap: 6px; padding: 12px 18px; border-radius: 24px; font-size: 14px; font-weight: 700; text-decoration: none; }
  .btn-primary { background: var(--gold); color: #1a1300; }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .footer { margin-top: 40px; padding: 24px 0; border-top: 1px solid var(--border); color: var(--text3); font-size: 12px; text-align: center; }
  .footer a { color: var(--gold); text-decoration: none; }
  .err { padding: 40px 20px; text-align: center; color: var(--text2); }
  .access-note { background: rgba(157,89,255,0.10); border:1px solid rgba(157,89,255,0.4); border-radius: 14px; padding: 12px 14px; margin-bottom: 16px; }
  .access-note b { color: #c8a8ff; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">Luma<b>Scout</b></div>
    <a id="open-app" class="open-btn" href="#">Open in app</a>
  </div>
  <div id="root"><div class="err">Loading…</div></div>
  <div class="footer">Discover photo locations · Connect with photographers · <a href="/">Get the LumaScout app</a></div>
</div>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const root = document.getElementById('root');
  const openBtn = document.getElementById('open-app');
  if (!id) { root.innerHTML = '<div class="err">No spot specified.</div>'; return; }
  // Deep link into the app if installed
  openBtn.href = 'lumascout://spot/' + id;
  try {
    const r = await fetch('/api/spots/' + encodeURIComponent(id));
    if (!r.ok) throw new Error('not found');
    const s = await r.json();
    document.title = (s.title || 'Photo Spot') + ' · LumaScout';
    const og = document.getElementById('og-image');
    const cover = (s.images && s.images[0] && (s.images[0].image_url || s.images[0].url)) || s.hero_cover_image_url || '';
    if (og && cover) og.setAttribute('content', cover);
    const heroUrl = cover || '';
    const imgs = (s.images || []).filter(i => i && (i.image_url || i.url)).map(i => i.image_url || i.url);
    const cityLine = [s.city, s.state].filter(Boolean).join(', ');
    const tags = (s.shoot_types || []).slice(0, 4);
    const accessLabel = s.land_access === 'private' ? 'Private land — permission required' : s.land_access === 'public' ? 'Public land' : null;
    const accessHtml = accessLabel ? '<div class="access-note"><b>' + accessLabel + '</b>' + (s.access_notes ? '<div style="margin-top:4px;color:#A1A1AA;font-size:13px;">' + s.access_notes.replace(/[<>]/g,'') + '</div>' : '') + '</div>' : '';
    const directionsUrl = (s.latitude && s.longitude) ? ('https://www.google.com/maps/dir/?api=1&destination=' + s.latitude + ',' + s.longitude) : null;
    root.innerHTML = '<div class="hero">' + (heroUrl ? '<img id="main-img" src="' + heroUrl + '" alt="">' : '<div class="err">No photo</div>') + '</div>' +
      (imgs.length > 1 ? '<div class="gallery">' + imgs.map((u, i) => '<img data-src="' + u + '" src="' + u + '" class="' + (i === 0 ? 'active' : '') + '">').join('') + '</div>' : '') +
      '<div class="meta">' +
        '<h1 class="title">' + (s.title || 'Untitled') + '</h1>' +
        (cityLine ? '<div class="city">' + cityLine + '</div>' : '') +
        (tags.length ? '<div class="chips">' + tags.map(t => '<span class="chip">' + t + '</span>').join('') + '</div>' : '') +
        accessHtml +
        (s.description ? '<p class="desc">' + (s.description || '').replace(/[<>]/g,'') + '</p>' : '') +
        '<div class="actions">' +
          (directionsUrl ? '<a class="btn btn-primary" target="_blank" rel="noopener" href="' + directionsUrl + '">Get directions</a>' : '') +
          '<a class="btn btn-secondary" href="lumascout://spot/' + id + '">Open in app</a>' +
        '</div>' +
      '</div>';
    document.querySelectorAll('.gallery img').forEach(t => t.addEventListener('click', e => {
      document.getElementById('main-img').src = e.currentTarget.dataset.src;
      document.querySelectorAll('.gallery img').forEach(x => x.classList.remove('active'));
      e.currentTarget.classList.add('active');
    }));
  } catch (e) {
    root.innerHTML = '<div class="err">This spot couldn\'t be loaded. It may be private or removed.</div>';
  }
})();
</script>
</body>
</html>
